<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0f0f0f">
<link rel="manifest" href="manifest.json">
<link rel="icon" id="favicon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>">
<title>隐私聊天</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;overflow:hidden;overscroll-behavior:none;-webkit-touch-callout:none}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue','PingFang SC',sans-serif;background:#0f0f0f;color:#eee;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
input,button{font-family:inherit;font-size:16px;-webkit-appearance:none;appearance:none;border:none;outline:none;touch-action:manipulation}
:root{--sb:env(safe-area-inset-bottom,0px)}

/* Login */
.login{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:20px}
.login-box{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:16px;padding:36px 28px;width:100%;max-width:360px}
.login-box h1{text-align:center;font-size:22px;margin-bottom:6px}
.login-box .sub{text-align:center;color:#999;font-size:13px;margin-bottom:24px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;color:#999;margin-bottom:4px}
.fg input{width:100%;padding:11px 14px;border:1px solid #2a2a4a;border-radius:10px;background:#0f0f0f;color:#eee;font-size:16px}
.fg input:focus{border-color:#e94560}
.lbtn{width:100%;padding:13px;border-radius:10px;background:#e94560;color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.lbtn:active{opacity:.8}
.lerr{color:#e94560;text-align:center;margin-top:10px;font-size:12px;min-height:18px}

/* Chat */
.chat{display:none;flex-direction:column;height:100%;width:100%;overflow:hidden}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#1a1a2e;border-bottom:1px solid #2a2a4a;flex-shrink:0;min-height:44px}
.hdr-l{display:flex;align-items:center;gap:8px}
.hdr-logo{width:30px;height:30px;background:#e94560;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.hdr-t{font-size:14px;font-weight:600}
.hdr-r{display:flex;align-items:center;gap:6px}
.ubadge{background:#0f3460;padding:3px 10px;border-radius:14px;font-size:11px}
.lout{background:none;border:1px solid #2a2a4a;color:#999;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer}
.obar{display:flex;align-items:center;gap:4px;padding:4px 14px;background:#16213e;border-bottom:1px solid #2a2a4a;font-size:10px;color:#999;flex-shrink:0;min-height:24px;flex-wrap:wrap}
.odot{width:5px;height:5px;background:#4ade80;border-radius:50%;display:inline-block;flex-shrink:0}
.ous{display:inline-flex;align-items:center;gap:3px;margin-right:6px}

/* Messages */
.msgs{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:10px 14px;display:flex;flex-direction:column;gap:3px;min-height:0}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:2px}
.m{max-width:80%;padding:7px 11px;border-radius:12px;font-size:14px;line-height:1.45;word-break:break-word;flex-shrink:0}
.m.s{align-self:flex-end;background:#0f3460;border-bottom-right-radius:3px}
.m.r{align-self:flex-start;background:#1a1a2e;border:1px solid #2a2a4a;border-bottom-left-radius:3px}
.m .sn{font-size:10px;color:#e94560;margin-bottom:2px;font-weight:600}
.m .tm{font-size:9px;color:#666;margin-top:2px;text-align:right}
.m.sys{align-self:center;background:none;color:#666;font-size:11px;max-width:100%;text-align:center;padding:3px 6px}
.m img.mi{max-width:100%;border-radius:6px;margin-bottom:3px;cursor:pointer;display:block}
.m .eo{font-size:48px;line-height:1.2;text-align:center}
.ss{text-align:center;font-size:9px;padding:2px;flex-shrink:0;color:#666}
.ss.ok{color:#4ade80}
.ss.err{color:#e94560}

/* Bottom */
.bot{flex-shrink:0;background:#1a1a2e;border-top:1px solid #2a2a4a;padding-bottom:var(--sb)}
.ir{display:flex;align-items:center;gap:4px;padding:6px 10px}
.ir input{flex:1;min-width:0;padding:9px 12px;border:1px solid #2a2a4a;border-radius:18px;background:#0f0f0f;color:#eee;font-size:16px;height:38px}
.tb{width:38px;height:38px;border:none;border-radius:50%;background:none;color:#999;font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tb:active{background:rgba(255,255,255,.08)}
.sb{width:38px;height:38px;border:none;border-radius:50%;background:#e94560;color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb:active{opacity:.8}

/* Emoji Panel */
.ep{display:none;border-top:1px solid #2a2a4a;background:#16213e}
.ep.open{display:block}
.etabs{display:flex;border-bottom:1px solid #2a2a4a;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:3px 6px;gap:1px}
.etabs::-webkit-scrollbar{display:none}
.etab{padding:5px 8px;border:none;border-radius:5px;background:none;color:#999;font-size:16px;cursor:pointer;white-space:nowrap;flex-shrink:0;min-width:34px;text-align:center}
.etab.on{background:#0f3460}
.escroll{height:170px;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:6px}
.egrid{display:flex;flex-wrap:wrap;gap:1px}
.ei{width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;border-radius:5px;flex-shrink:0}
.ei:active{background:#0f3460}
.ebar{display:flex;justify-content:center;padding:3px;border-top:1px solid #2a2a4a}
.ebar button{background:none;border:none;color:#666;font-size:11px;cursor:pointer;padding:5px 14px}

/* Image Preview */
.ip{display:none;padding:6px 10px;background:#16213e;border-top:1px solid #2a2a4a;align-items:center;gap:8px}
.ip.open{display:flex}
.ip img{width:44px;height:44px;object-fit:cover;border-radius:6px;border:1px solid #2a2a4a}
.ip .pi{flex:1;font-size:10px;color:#999}
.ip .rb{background:none;border:none;color:#e94560;font-size:18px;cursor:pointer;padding:4px 6px}

/* Image Viewer */
.iv{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.95);z-index:9999;align-items:center;justify-content:center}
.iv.open{display:flex}
.iv img{max-width:95%;max-height:95%;object-fit:contain}

/* Toast Notification */
.toast{position:fixed;top:-150px;left:50%;transform:translateX(-50%);width:calc(100% - 24px);max-width:420px;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);border:2px solid #e94560;border-radius:14px;padding:14px 16px;z-index:99998;display:flex;align-items:center;gap:12px;transition:top .4s cubic-bezier(0.34,1.56,0.64,1);cursor:pointer;box-shadow:0 8px 32px rgba(233,69,96,.5),0 0 0 1px rgba(233,69,96,.2)}
.toast.show{top:12px}
.toast-icon{width:42px;height:42px;background:linear-gradient(135deg,#e94560,#c23152);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;animation:toastPulse 1.5s ease infinite}
@keyframes toastPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:.8}}
.toast-body{flex:1;min-width:0;overflow:hidden}
.toast-title{font-size:13px;font-weight:700;color:#e94560;margin-bottom:3px}
.toast-text{font-size:14px;color:#eee;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Notification Button */
.notif-btn{background:none;border:1px solid #2a2a4a;color:#eee;padding:4px 10px;border-radius:8px;font-size:16px;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;min-width:40px;min-height:32px}
.notif-btn:active{background:rgba(255,255,255,.08)}
.notif-btn.muted{opacity:.4}
.notif-badge{position:absolute;top:-8px;right:-8px;background:#e94560;color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;box-shadow:0 2px 6px rgba(233,69,96,.5)}

/* Offline Summary Overlay */
.offline-summary{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:99997;align-items:center;justify-content:center;padding:20px}
.offline-summary.show{display:flex}
.offline-box{background:#1a1a2e;border:2px solid #e94560;border-radius:16px;padding:28px 24px;max-width:360px;width:100%;text-align:center;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.offline-box .ob-icon{font-size:48px;margin-bottom:12px}
.offline-box .ob-title{font-size:18px;font-weight:700;color:#e94560;margin-bottom:8px}
.offline-box .ob-count{font-size:42px;font-weight:800;color:#fff;margin:10px 0}
.offline-box .ob-label{font-size:13px;color:#999;margin-bottom:16px}
.offline-box .ob-detail{font-size:12px;color:#aaa;text-align:left;margin-bottom:16px;max-height:150px;overflow-y:auto;padding:10px;background:#0f0f0f;border-radius:8px;border:1px solid #2a2a4a}
.offline-box .ob-detail .od-item{padding:4px 0;border-bottom:1px solid #1a1a2e;display:flex;gap:6px}
.offline-box .ob-detail .od-item:last-child{border-bottom:none}
.offline-box .ob-detail .od-name{color:#e94560;font-weight:600;white-space:nowrap}
.offline-box .ob-detail .od-text{color:#ccc;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.offline-box .ob-btn{background:#e94560;color:#fff;border:none;padding:12px 32px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;width:100%}
.offline-box .ob-btn:active{opacity:.8}

/* ===== Notification Permission Guide ===== */
.notif-guide{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:100000;align-items:center;justify-content:center;padding:20px}
.notif-guide.show{display:flex}
.ng-box{background:#1a1a2e;border:2px solid #e94560;border-radius:20px;padding:32px 24px;max-width:400px;width:100%;text-align:center;animation:slideUp .4s ease}
.ng-icon{font-size:56px;margin-bottom:16px;animation:bellRing 1s ease infinite}
@keyframes bellRing{0%,100%{transform:rotate(0)}10%{transform:rotate(15deg)}20%{transform:rotate(-15deg)}30%{transform:rotate(10deg)}40%{transform:rotate(-10deg)}50%{transform:rotate(0)}}
.ng-title{font-size:20px;font-weight:700;color:#fff;margin-bottom:10px}
.ng-desc{font-size:14px;color:#aaa;margin-bottom:20px;line-height:1.6}
.ng-steps{text-align:left;background:#0f0f0f;border-radius:12px;padding:16px;margin-bottom:20px;border:1px solid #2a2a4a}
.ng-step{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #1a1a2e}
.ng-step:last-child{border-bottom:none}
.ng-num{width:24px;height:24px;background:#e94560;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.ng-txt{font-size:13px;color:#ccc;line-height:1.5}
.ng-btn{background:#e94560;color:#fff;border:none;padding:14px 32px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;width:100%;margin-bottom:10px}
.ng-btn:active{opacity:.8}
.ng-skip{background:none;border:none;color:#666;font-size:13px;cursor:pointer;padding:8px}
.ng-warn{background:rgba(233,69,96,.1);border:1px solid rgba(233,69,96,.3);border-radius:10px;padding:12px;margin-bottom:16px;font-size:12px;color:#e94560;line-height:1.5}

/* Toggle Tip */
.toggle-tip{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(26,26,46,.95);color:#eee;padding:14px 28px;border-radius:12px;font-size:15px;z-index:99999;border:1px solid #e94560;pointer-events:none;transition:opacity .3s;box-shadow:0 4px 20px rgba(0,0,0,.5)}

@media(max-width:600px){.m{max-width:85%}.escroll{height:150px}.ng-box{padding:24px 18px}}
</style>
</head>

<button class="sb" id="btnSend">➤</button>
</div>
</div>
<input type="file" id="fInput" accept="image/*" style="display:none">

<div class="iv" id="imgViewer"><img id="viewImg" src=""></div>

<!-- Toast Notification -->
<div class="toast" id="toast">

<div class="toast-body">
<div class="toast-title" id="toastTitle"></div>

</div>
</div>

<!-- Offline Summary Overlay -->
<div class="offline-summary" id="offlineSummary">
<div class="offline-box">
<div class="ob-icon">💬</div>
<div class="ob-title">你有新消息</div>
<div class="ob-count" id="obCount">0</div>

<div class="ob-detail" id="obDetail"></div>
<button class="ob-btn" id="obBtn">查看消息</button>
</div>
</div>

<!-- Notification Permission Guide -->
<div class="notif-guide" id="notifGuide">
<div class="ng-box">
<div class="ng-icon">🔔</div>
<div class="ng-title">开启消息通知</div>

<div class="ng-warn" id="ngWarn" style="display:none"></div>
<div class="ng-steps" id="ngSteps">
<div class="ng-step"><div class="ng-num">1</div><div class="ng-txt">点击下方"允许"按钮</div></div>
<div class="ng-step"><div class="ng-num">2</div><div class="ng-txt">浏览器会弹出权限请求，点击"允许"</div></div>
<div class="ng-step"><div class="ng-num">3</div><div class="ng-txt">切到其他应用后，新消息会以系统通知弹出</div></div>
</div>
<button class="ng-btn" id="ngBtn">开启通知权限</button>
<button class="ng-skip" id="ngSkip">暂时跳过</button>
</div>
</div>

// ========== DYNAMIC FAVICON ==========
function setFavicon(count){
try{
var canvas=document.createElement('canvas');
canvas.width=32;canvas.height=32;
var ctx=canvas.getContext('2d');
ctx.font='28px serif';
ctx.fillText('🔒',2,26);
if(count>0){
ctx.fillStyle='#e94560';
ctx.beginPath();
var bx=24,by=8,br=count>9?10:8;
ctx.arc(bx,by,br,0,Math.PI*2);
ctx.fill();
ctx.fillStyle='#fff';
ctx.font='bold '+(count>9?'9':'11')+'px sans-serif';
ctx.textAlign='center';
ctx.textBaseline='middle';
ctx.fillText(count>99?'99+':count,bx,by+1);
}
var link=document.getElementById('favicon');
if(!link){link=document.createElement('link');link.rel='icon';link.id='favicon';document.head.appendChild(link)}
link.href=canvas.toDataURL('image/png');
}catch(e){}
}

// ========== UNREAD COUNT PERSISTENCE ==========
function loadUnread(){
try{
var d=localStorage.getItem('ltrj_unread_'+S.user.name);
if(d){
var obj=JSON.parse(d);
S.ucount=obj.count||0;
S.offlineBuffer=obj.messages||[];
}
}catch(e){}
}
function saveUnread(){
try{
localStorage.setItem('ltrj_unread_'+S.user.name,JSON.stringify({
count:S.ucount,
messages:S.offlineBuffer.slice(-20),
ts:Date.now()
}));
}catch(e){}
}
function clearUnread(){
S.ucount=0;
S.offlineBuffer=[];
try{localStorage.removeItem('ltrj_unread_'+S.user.name)}catch(e){}
}

// ========== AUDIO ==========
function unlockAudio(){
try{
var C=window.AudioContext||window.webkitAudioContext;
if(C&&!S.audioCtx)S.audioCtx=new C();
if(S.audioCtx&&S.audioCtx.state==='suspended')S.audioCtx.resume();
}catch(e){}
}

function playNotifSound(){
try{
if(!S.audioCtx){var C=window.AudioContext||window.webkitAudioContext;if(C)S.audioCtx=new C()}
if(!S.audioCtx)return;
if(S.audioCtx.state==='suspended')S.audioCtx.resume();
var now=S.audioCtx.currentTime;
var o1=S.audioCtx.createOscillator(),g1=S.audioCtx.createGain();
o1.connect(g1);g1.connect(S.audioCtx.destination);
o1.frequency.value=880;o1.type='sine';
g1.gain.setValueAtTime(0.5,now);
g1.gain.exponentialRampToValueAtTime(0.01,now+0.15);
o1.start(now);o1.stop(now+0.15);
var o2=S.audioCtx.createOscillator(),g2=S.audioCtx.createGain();
o2.connect(g2);g2.connect(S.audioCtx.destination);
o2.frequency.value=1100;o2.type='sine';
g2.gain.setValueAtTime(0.4,now+0.2);
g2.gain.exponentialRampToValueAtTime(0.01,now+0.4);
o2.start(now+0.2);o2.stop(now+0.4);
}catch(e){}
}

// ========== TITLE FLASHING ==========
function startTitleFlash(sender){
if(S.titleTimer)return;
var flash=true;
var msgText='💬 '+sender;
S.titleTimer=setInterval(function(){
document.title=flash?msgText:S.origTitle+(S.ucount>0?' ('+S.ucount+')':'');
flash=!flash;
},1000);
}
function stopTitleFlash(){
if(S.titleTimer){clearInterval(S.titleTimer);S.titleTimer=null}
document.title=S.ucount>0?'('+S.ucount+') '+S.origTitle:S.origTitle;
}

// ========== NOTIFICATIONS ==========
function showNotif(sender,body){
try{
// 1. Toast popup (always show in-page)
if(D.toast&&D.toastTitle&&D.toastText){
D.toastTitle.textContent=sender;
D.toastText.textContent=body;
D.toast.classList.add('show');
clearTimeout(S.toastTimer);
S.toastTimer=setTimeout(function(){if(D.toast)D.toast.classList.remove('show')},5000);
}
// 2. Vibration
if(S.soundOn&&navigator.vibrate)try{navigator.vibrate([100,50,100,50,100])}catch(e){}
// 3. Sound
if(S.soundOn)playNotifSound();
// 4. Desktop notification (when page NOT visible)
if(!S.visible && 'Notification' in window && S.nperm==='granted'){
try{
var n=new Notification('💬 '+sender,{
body:body,
tag:'ltrj-'+Date.now(),
icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=\'.9em\' font-size=\'90\'>💬</text></svg>',
silent:false,
requireInteraction:false
});
n.onclick=function(){window.focus();n.close();clearUnread();updBadge();setFavicon(0);stopTitleFlash()};
setTimeout(function(){try{n.close()}catch(e){}},10000);
}catch(e){}
}
// 5. Title flashing (when page not visible)
if(!S.visible){
startTitleFlash(sender);
}
// 6. Update count & badge
S.ucount++;
updBadge();
setFavicon(S.ucount);
// 7. Save to offline buffer
S.offlineBuffer.push({sender:sender,body:body,ts:Date.now()});
if(S.offlineBuffer.length>20)S.offlineBuffer=S.offlineBuffer.slice(-20);
saveUnread();
}catch(e){}
}

function updBadge(){
document.title=S.ucount>0?'('+S.ucount+') 隐私聊天':'隐私聊天';
if(D.notifBadge){
if(S.ucount>0){D.notifBadge.textContent=S.ucount>99?'99+':S.ucount;D.notifBadge.style.display='flex'}
else{D.notifBadge.style.display='none'}
}
}

D.ngBtn.textContent='我知道了';
D.ngBtn.onclick=function(){D.notifGuide.classList.remove('show')};
D.notifGuide.classList.add('show');
}

function showIOSWarning(){
S.notifGuideShown=true;
D.ngWarn.style.display='block';
D.ngWarn.innerHTML='⚠️ 你使用的是 iPhone/iPad，Safari 浏览器不支持网页通知。<br><br>建议：将本页面"添加到主屏幕"，可获得更好的通知体验。';
D.ngSteps.innerHTML='<div class="ng-step"><div class="ng-num">1</div><div class="ng-txt">点击 Safari 底部的分享按钮（⬆️）</div></div><div class="ng-step"><div class="ng-num">2</div><div class="ng-txt">向下滑动，点击"添加到主屏幕"</div></div><div class="ng-step"><div class="ng-num">3</div><div class="ng-txt">从主屏幕打开，获得更好的通知体验</div></div>';
D.ngBtn.textContent='我知道了';
D.ngBtn.onclick=function(){D.notifGuide.classList.remove('show')};
D.notifGuide.classList.add('show');
}

// ========== OFFLINE SUMMARY ==========
function showOfflineSummary(){
if(S.ucount<=0)return;
D.obCount.textContent=S.ucount;
var html='';
var shown=S.offlineBuffer.slice(-10);
shown.forEach(function(m){
html+='<div class="od-item"><span class="od-name">'+esc(m.sender)+'</span><span class="od-text">'+esc(m.body)+'</span></div>';
});
D.obDetail.innerHTML=html;
D.offlineSummary.classList.add('show');
}

function hideOfflineSummary(){
D.offlineSummary.classList.remove('show');
clearUnread();
updBadge();
setFavicon(0);
scrollBot();
}

// ========== VISIBILITY ==========
function initVis(){
document.addEventListener('visibilitychange',function(){
S.visible=!document.hidden;
if(!document.hidden){
// Page became visible
stopTitleFlash();
setFavicon(S.ucount>0?S.ucount:0);
}else{
// Page hidden - start title flash if unread
if(S.ucount>0){
startTitleFlash('新消息');
}
}
});
// Save state before unload
window.addEventListener('beforeunload',function(){
saveUnread();
});
// iOS pagehide
window.addEventListener('pagehide',function(){
saveUnread();
});
}

// ========== TOGGLE TIP ==========
function showToggleTip(msg){
var tip=document.createElement('div');
tip.className='toggle-tip';
tip.textContent=msg;
document.body.appendChild(tip);
setTimeout(function(){tip.style.opacity='0';setTimeout(function(){if(tip.parentNode)tip.parentNode.removeChild(tip)},300)},1200);
}

// ========== iOS FIX ==========
function fixIOS(){
var ua=navigator.userAgent;
if(/iPad|iPhone|iPod/.test(ua)&&!window.MSStream){
var fix=function(){
var vh=window.visualViewport?window.visualViewport.height:window.innerHeight;
D.chat.style.height=vh+'px';
scrollBot();
};
if(window.visualViewport)window.visualViewport.addEventListener('resize',fix);
window.addEventListener('resize',fix);
fix();
}
}

// ========== EVENT BINDING ==========
function bind(){
D.btnLogin.addEventListener('click',doLogin);
D.iPass.addEventListener('keydown',function(e){if(e.key==='Enter')doLogin()});
D.iUser.addEventListener('keydown',function(e){if(e.key==='Enter')D.iPass.focus()});
D.btnLogout.addEventListener('click',doLogout);
D.btnEmoji.addEventListener('click',function(){
S.eopen=!S.eopen;D.ep.classList.toggle('open',S.eopen);
if(S.eopen){D.iMsg.blur();scrollBot()}else{D.iMsg.focus()}
});
D.btnEmojiClose.addEventListener('click',function(){S.eopen=false;D.ep.classList.remove('open');D.iMsg.focus()});
D.btnPic.addEventListener('click',function(){D.fInput.click()});
D.btnCam.addEventListener('click',function(){D.cInput.click()});
D.btnSend.addEventListener('click',doSend);
D.iMsg.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend()}});
D.iMsg.addEventListener('focus',function(){if(S.eopen){S.eopen=false;D.ep.classList.remove('open')}});
D.fInput.addEventListener('change',function(e){if(e.target.files&&e.target.files[0])procImg(e.target.files[0]);e.target.value=''});
D.cInput.addEventListener('change',function(e){if(e.target.files&&e.target.files[0])procImg(e.target.files[0]);e.target.value=''});
D.btnRmImg.addEventListener('click',rmImg);
D.iv.addEventListener('click',function(){D.iv.classList.remove('open')});
// Toast click
D.toast.addEventListener('click',function(){
D.toast.classList.remove('show');clearTimeout(S.toastTimer);
clearUnread();updBadge();setFavicon(0);stopTitleFlash();scrollBot();
});
// Notification toggle
D.btnNotif.addEventListener('click',function(){
S.soundOn=!S.soundOn;
saveSoundPref();
if(S.soundOn){
showToggleTip('🔔 消息提醒已开启');
unlockAudio();
// If permission not granted, show guide
if('Notification' in window && Notification.permission!=='granted'){
setTimeout(function(){checkAndGuideNotif()},500);
}
}else{
showToggleTip('🔕 消息提醒已关闭');
}
});
// Notification guide buttons
D.ngBtn.addEventListener('click',function(){
if('Notification' in window && Notification.permission==='default'){
Notification.requestPermission().then(function(p){
S.nperm=p;
D.notifGuide.classList.remove('show');
if(p==='granted'){
showToggleTip('✅ 通知已开启！切到其他应用也能收到提醒');
}else if(p==='denied'){
showDeniedGuide();
}
});
}else{
D.notifGuide.classList.remove('show');
}
});
D.ngSkip.addEventListener('click',function(){
D.notifGuide.classList.remove('show');
showToggleTip('💡 你可以点击顶部 🔔 按钮重新开启');
});
// Offline summary dismiss
D.obBtn.addEventListener('click',hideOfflineSummary);
D.offlineSummary.addEventListener('click',function(e){if(e.target===D.offlineSummary)hideOfflineSummary()});
}

// ========== LOGIN / LOGOUT ==========
function doLogin(){
var u=D.iUser.value.trim().toLowerCase(),p=D.iPass.value;
if(!u||!p){D.loginErr.textContent='请输入用户名和密码';return}
if(!CFG.users[u]){D.loginErr.textContent='用户不存在';return}
if(CFG.users[u].pw!==p){D.loginErr.textContent='密码错误';return}
S.user={name:u,display:CFG.users[u].name};
D.loginErr.textContent='';
unlockAudio();
// Check notification permission
if('Notification' in window){
S.nperm=Notification.permission;
}
// Load unread count from previous session
loadUnread();
showChat();
}

function doLogout(){
if(S.client){pubPres('offline');setTimeout(function(){try{S.client.end()}catch(e){};S.client=null},500)}
clearInterval(S.hb);
clearUnread();
stopTitleFlash();
S.user=null;S.omap={};S.notifGuideShown=false;
D.msgs.innerHTML='';D.chat.style.display='none';D.login.style.display='flex';
D.iUser.value='';D.iPass.value='';
setFavicon(0);
document.title='隐私聊天';
}

// ========== CHAT ==========
function showChat(){
D.login.style.display='none';D.chat.style.display='flex';
D.hdrUser.textContent=S.user.display;
fixIOS();loadHist();initEP();connect();
// Show notification guide after connection
setTimeout(function(){checkAndGuideNotif()},2000);
}

function loadHist(){
D.msgs.innerHTML='';
if(S.stor){try{var d=localStorage.getItem('ltrj_h_'+S.user.name);if(d)S.hist=JSON.parse(d)}catch(e){S.hist=[]}}
if(S.hist.length){
addSys('--- 历史消息 ('+S.hist.length+'条) ---');
S.hist.forEach(function(m){
if(m.type==='chat')addMsg(m.text,m.sender,m.sent,m.ts);
else if(m.type==='emoji')addEmo(m.emoji,m.sender,m.sent,m.ts,m.sticker);
else if(m.type==='image')addImg(m.data,m.sender,m.sent,m.ts);
});
setTimeout(scrollBot,50);
}
}

function saveH(m){S.hist.push(m);if(S.hist.length>500)S.hist=S.hist.slice(-500);if(S.stor){try{localStorage.setItem('ltrj_h_'+S.user.name,JSON.stringify(S.hist))}catch(e){}}}

// ========== EMOJI ==========
function initEP(){
D.etabs.innerHTML='';
EC.forEach(function(c,i){
var b=document.createElement('button');b.className='etab'+(i===0?' on':'');b.textContent=c.n;
b.addEventListener('click',function(){D.etabs.querySelectorAll('.etab').forEach(function(t){t.classList.remove('on')});b.classList.add('on');rGrid(i)});
D.etabs.appendChild(b);
});
rGrid(0);
}

function rGrid(i){
D.egrid.innerHTML='';
EC[i].e.forEach(function(em){
var s=document.createElement('span');s.className='ei';s.textContent=em;
s.addEventListener('click',function(){D.iMsg.value+=em});
D.egrid.appendChild(s);
});
}

// ========== SEND ==========
function doSend(){
var t=D.iMsg.value.trim();
if(S.pimg){sendImg();if(t)sendTxt(t);return}
if(t)sendTxt(t);
}

function sendTxt(t){
if(!S.client||!S.client.connected){setS('未连接','err');return}
var ts=Date.now();
addMsg(t,S.user.display,true,ts);saveH({type:'chat',text:t,sender:S.user.display,sent:true,ts:ts});
S.client.publish(CFG.topic+'/messages',JSON.stringify({type:'chat',username:S.user.name,displayName:S.user.display,text:t,ts:ts}),{qos:1});
D.iMsg.value='';
}

function sendImg(){
if(!S.pimg||!S.client||!S.client.connected)return;
var ts=Date.now();
addImg(S.pimg,S.user.display,true,ts);saveH({type:'image',data:S.pimg,sender:S.user.display,sent:true,ts:ts});
S.client.publish(CFG.topic+'/messages',JSON.stringify({type:'image',username:S.user.name,displayName:S.user.display,imageData:S.pimg,ts:ts}),{qos:1});
rmImg();
}

function procImg(f){
if(f.size>10*1024*1024){alert('图片不能超过10MB');return}
var r=new FileReader();
r.onload=function(e){
var img=new Image();
img.onload=function(){
var c=document.createElement('canvas'),mw=800,mh=800,w=img.width,h=img.height;
if(w>mw){h=h*(mw/w);w=mw}if(h>mh){w=w*(mh/h);h=mh}
c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
var d=c.toDataURL('image/jpeg',0.7);
S.pimg=d;D.prevImg.src=d;D.prevInfo.textContent=w+'x'+h+' · '+Math.round(d.length/1024)+'KB';
D.ip.classList.add('open');
};img.src=e.target.result;
};r.readAsDataURL(f);
}

function rmImg(){S.pimg=null;D.ip.classList.remove('open');D.prevImg.src=''}

// ========== MESSAGE DISPLAY ==========
function addMsg(t,sn,sent,ts){
var d=document.createElement('div');d.className='m '+(sent?'s':'r');
var h='';if(!sent)h+='<div class="sn">'+esc(sn)+'</div>';
h+='<div>'+esc(t)+'</div><div class="tm">'+fmt(ts)+'</div>';
d.innerHTML=h;D.msgs.appendChild(d);scrollBot();
}

function addEmo(em,sn,sent,ts,stk){
var d=document.createElement('div');d.className='m '+(sent?'s':'r');
var h='';if(!sent)h+='<div class="sn">'+esc(sn)+'</div>';
h+='<div class="eo" style="font-size:'+(stk?'56px':'48px')+'">'+em+'</div>';
h+='<div class="tm">'+fmt(ts)+'</div>';
d.innerHTML=h;D.msgs.appendChild(d);scrollBot();
}

function addImg(data,sn,sent,ts){
var d=document.createElement('div');d.className='m '+(sent?'s':'r');
var h='';if(!sent)h+='<div class="sn">'+esc(sn)+'</div>';
h+='<img class="mi" src="'+data+'"><div class="tm">'+fmt(ts)+'</div>';
d.innerHTML=h;
d.querySelector('img').addEventListener('click',function(){D.viewImg.src=data;D.iv.classList.add('open')});
D.msgs.appendChild(d);scrollBot();
}

function addSys(t){var d=document.createElement('div');d.className='m sys';d.textContent=t;D.msgs.appendChild(d);scrollBot()}
function scrollBot(){requestAnimationFrame(function(){D.msgs.scrollTop=D.msgs.scrollHeight})}

// ========== MQTT ==========
function connect(){
setS('正在连接...','');var idx=0;
S.reconnecting=true;
function tryC(i){
if(i>=CFG.brokers.length){setS('连接失败','err');S.reconnecting=false;return}
try{
S.client=mqtt.connect(CFG.brokers[i],{
clientId:'ltrj-'+S.user.name,
clean:false,
connectTimeout:8000,
reconnectPeriod:3000,
keepalive:15
});
S.client.on('connect',function(){
setS('已连接','ok');
S.reconnecting=false;
S.client.subscribe(CFG.topic+'/messages',{qos:1});
S.client.subscribe(CFG.topic+'/presence',{qos:1});
pubPres('online');
addSys(S.user.display+' 加入聊天室');
S.hb=setInterval(function(){pubPres('online')},12000);
S.client.publish(CFG.topic+'/presence',JSON.stringify({type:'presence_request',username:S.user.name,ts:Date.now()}));
// Show offline summary
if(S.ucount>0){
setTimeout(function(){showOfflineSummary()},800);
}
});
S.client.on('message',function(tp,p){
try{var d=JSON.parse(p.toString());if(!d)return;
if(tp===CFG.topic+'/messages')onMsg(d);
else if(tp===CFG.topic+'/presence')onPres(d);
}catch(e){}
});
S.client.on('error',function(){});
S.client.on('offline',function(){setS('已断开','err')});
S.client.on('reconnect',function(){setS('重连中...','')});
}catch(e){setTimeout(function(){tryC(i+1)},1000)}
}
tryC(idx);
}

function onMsg(d){
if(d.username===S.user.name)return;
if(d.ts&&d.ts<=S.lastTs)return;
S.lastTs=d.ts;
var sn=d.displayName||d.username;
if(d.type==='chat'){
saveH({type:'chat',text:d.text,sender:sn,sent:false,ts:d.ts});
addMsg(d.text,sn,false,d.ts);
showNotif(sn,d.text);
}else if(d.type==='emoji'){
saveH({type:'emoji',emoji:d.emoji,sender:sn,sent:false,ts:d.ts,sticker:d.sticker});
addEmo(d.emoji,sn,false,d.ts,d.sticker);
showNotif(sn,'[表情]');
}else if(d.type==='image'){
saveH({type:'image',data:d.imageData,sender:sn,sent:false,ts:d.ts});
addImg(d.imageData,sn,false,d.ts);
showNotif(sn,'[图片]');
}
}

function pubPres(s){if(!S.client||!S.client.connected)return;S.client.publish(CFG.topic+'/presence',JSON.stringify({type:'presence',username:S.user.name,displayName:S.user.display,status:s,ts:Date.now()}))}

function onPres(d){
if(d.type==='presence'){
if(d.status==='online')S.omap[d.username]={name:d.displayName||d.username,ts:d.ts};
else if(d.status==='offline')delete S.omap[d.username];
renderO();
}else if(d.type==='presence_request'){pubPres('online')}
}

function renderO(){
var now=Date.now();
for(var k in S.omap){if(now-S.omap[k].ts>45000)delete S.omap[k]}
S.omap[S.user.name]={name:S.user.display,ts:now};
var a=[];for(var k in S.omap){var sf=k===S.user.name?'（你）':'';a.push(S.omap[k].name+sf)}
D.hdrOnline.innerHTML=a.map(function(n){return '<span class="ous"><span class="odot"></span>'+esc(n)+'</span>'}).join('');
}
setInterval(function(){if(S.user)renderO()},10000);

// ========== UTILS ==========
function setS(t,c){D.sync.textContent=t;D.sync.className='ss'+(c?' '+c:'')}
function esc(s){var d=document.createElement('div');d.appendChild(document.createTextNode(s));return d.innerHTML}
function fmt(ts){var d=new Date(ts);return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)}

// ========== START ==========
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
})();
</script>
</body>
</html>
