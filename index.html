updNotifBtn();
}

try{localStorage.setItem('ltrj_sound',S.soundOn?'1':'0')}catch(e){}

}

}
}

// ========== DYNAMIC FAVICON ==========
function setFavicon(count){
var canvas=document.createElement('canvas');
canvas.width=32;canvas.height=32;
var ctx=canvas.getContext('2d');
// Draw base emoji
ctx.font='28px serif';
ctx.fillText('рЯФТ',2,26);
// Draw badge if count > 0
if(count>0){
ctx.fillStyle='#e94560';
ctx.beginPath();
var bx=24,by=8,br=count>9?10:8;
ctx.arc(bx,by,br,0,Math.PI*2);
ctx.fill();
ctx.fillStyle='#fff';
ctx.font='bold '+(count>9?'9':'11')+'px sans-serif';
ctx.textAlign='center';
ctx.textBaseline='middle';
ctx.fillText(count>99?'99+':count,bx,by+1);
}
var link=document.getElementById('favicon');
if(!link){link=document.createElement('link');link.rel='icon';link.id='favicon';document.head.appendChild(link)}
link.href=canvas.toDataURL('image/png');
}

// ========== UNREAD COUNT PERSISTENCE ==========
function loadUnread(){
try{
var d=localStorage.getItem('ltrj_unread_'+S.user.name);
if(d){
var obj=JSON.parse(d);
S.ucount=obj.count||0;
S.offlineBuffer=obj.messages||[];
}
}catch(e){}
}
function saveUnread(){
try{
localStorage.setItem('ltrj_unread_'+S.user.name,JSON.stringify({
count:S.ucount,
messages:S.offlineBuffer.slice(-20),
ts:Date.now()
}));
}catch(e){}
}
function clearUnread(){
S.ucount=0;
S.offlineBuffer=[];
try{localStorage.removeItem('ltrj_unread_'+S.user.name)}catch(e){}
}

// ========== AUDIO ==========
function unlockAudio(){
try{
var C=window.AudioContext||window.webkitAudioContext;
if(C&&!S.audioCtx)S.audioCtx=new C();
if(S.audioCtx&&S.audioCtx.state==='suspended')S.audioCtx.resume();
}catch(e){}
}

function playNotifSound(){
try{
if(!S.audioCtx){var C=window.AudioContext||window.webkitAudioContext;if(C)S.audioCtx=new C()}
if(!S.audioCtx)return;
if(S.audioCtx.state==='suspended')S.audioCtx.resume();
// Double beep pattern
var now=S.audioCtx.currentTime;
var o1=S.audioCtx.createOscillator(),g1=S.audioCtx.createGain();
o1.connect(g1);g1.connect(S.audioCtx.destination);
o1.frequency.value=880;o1.type='sine';
g1.gain.setValueAtTime(0.5,now);
g1.gain.exponentialRampToValueAtTime(0.01,now+0.15);
o1.start(now);o1.stop(now+0.15);
var o2=S.audioCtx.createOscillator(),g2=S.audioCtx.createGain();
o2.connect(g2);g2.connect(S.audioCtx.destination);
o2.frequency.value=1100;o2.type='sine';
g2.gain.setValueAtTime(0.4,now+0.2);
g2.gain.exponentialRampToValueAtTime(0.01,now+0.4);
o2.start(now+0.2);o2.stop(now+0.4);
}catch(e){}
}

// ========== NOTIFICATIONS ==========
function showNotif(sender,body){
try{
// 1. Toast popup
if(D.toast&&D.toastTitle&&D.toastText){
D.toastTitle.textContent=sender;
D.toastText.textContent=body;
D.toast.classList.add('show');
clearTimeout(S.toastTimer);
S.toastTimer=setTimeout(function(){if(D.toast)D.toast.classList.remove('show')},5000);
}
// 2. Vibration
if(S.soundOn&&navigator.vibrate)try{navigator.vibrate([100,50,100,50,100])}catch(e){}
// 3. Sound
if(S.soundOn)playNotifSound();
// 4. Desktop notification (when page hidden)
if(document.hidden&&'Notification' in window&&S.nperm==='granted'){
try{
var n=new Notification(sender,{
body:body,
tag:'ltrj-chat',
icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=\'.9em\' font-size=\'90\'>рЯТђ</text></svg>',
silent:false
});
n.onclick=function(){window.focus();n.close();clearUnread();updBadge()};
setTimeout(function(){try{n.close()}catch(e){}},8000);
}catch(e){}
}
// 5. Update count & badge
S.ucount++;
updBadge();
setFavicon(S.ucount);
// 6. Save to offline buffer
S.offlineBuffer.push({sender:sender,body:body,ts:Date.now()});
if(S.offlineBuffer.length>20)S.offlineBuffer=S.offlineBuffer.slice(-20);
saveUnread();
}catch(e){}
}

function updBadge(){
// Title
document.title=S.ucount>0?'('+S.ucount+') йЪРзІБиБКе§©':'йЪРзІБиБКе§©';
// Badge on button
if(D.notifBadge){
if(S.ucount>0){D.notifBadge.textContent=S.ucount>99?'99+':S.ucount;D.notifBadge.style.display='flex'}
else{D.notifBadge.style.display='none'}
}
}

// ========== OFFLINE SUMMARY ==========
function showOfflineSummary(){
if(S.ucount<=0)return;
D.obCount.textContent=S.ucount;
var html='';
var shown=S.offlineBuffer.slice(-10);
shown.forEach(function(m){
html+='<div class="od-item"><span class="od-name">'+esc(m.sender)+'</span><span class="od-text">'+esc(m.body)+'</span></div>';
});
D.obDetail.innerHTML=html;
D.offlineSummary.classList.add('show');
}

function hideOfflineSummary(){
D.offlineSummary.classList.remove('show');
clearUnread();
updBadge();
setFavicon(0);
scrollBot();
}

// ========== VISIBILITY ==========
function initVis(){
document.addEventListener('visibilitychange',function(){
S.visible=!document.hidden;
if(!document.hidden){
// Page became visible - clear badge but keep offline count for summary
setFavicon(0);
}
});
// Save state before unload
window.addEventListener('beforeunload',function(){
saveUnread();
});
// Also save on pagehide (iOS)
window.addEventListener('pagehide',function(){
saveUnread();
});
}

// ========== TOGGLE TIP ==========
function showToggleTip(msg){
var tip=document.createElement('div');
tip.className='toggle-tip';
tip.textContent=msg;
document.body.appendChild(tip);
setTimeout(function(){tip.style.opacity='0';setTimeout(function(){if(tip.parentNode)tip.parentNode.removeChild(tip)},300)},1200);
}

// ========== iOS FIX ==========
function fixIOS(){
var ua=navigator.userAgent;
if(/iPad|iPhone|iPod/.test(ua)&&!window.MSStream){
var fix=function(){
var vh=window.visualViewport?window.visualViewport.height:window.innerHeight;
D.chat.style.height=vh+'px';
scrollBot();
};
if(window.visualViewport)window.visualViewport.addEventListener('resize',fix);
window.addEventListener('resize',fix);
fix();
}
}

// ========== EVENT BINDING ==========
function bind(){
D.btnLogin.addEventListener('click',doLogin);
D.iPass.addEventListener('keydown',function(e){if(e.key==='Enter')doLogin()});
D.iUser.addEventListener('keydown',function(e){if(e.key==='Enter')D.iPass.focus()});
D.btnLogout.addEventListener('click',doLogout);
D.btnEmoji.addEventListener('click',function(){
S.eopen=!S.eopen;D.ep.classList.toggle('open',S.eopen);
if(S.eopen){D.iMsg.blur();scrollBot()}else{D.iMsg.focus()}
});
D.btnEmojiClose.addEventListener('click',function(){S.eopen=false;D.ep.classList.remove('open');D.iMsg.focus()});
D.btnPic.addEventListener('click',function(){D.fInput.click()});
D.btnCam.addEventListener('click',function(){D.cInput.click()});
D.btnSend.addEventListener('click',doSend);
D.iMsg.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend()}});
D.iMsg.addEventListener('focus',function(){if(S.eopen){S.eopen=false;D.ep.classList.remove('open')}});
D.fInput.addEventListener('change',function(e){if(e.target.files&&e.target.files[0])procImg(e.target.files[0]);e.target.value=''});
D.cInput.addEventListener('change',function(e){if(e.target.files&&e.target.files[0])procImg(e.target.files[0]);e.target.value=''});
D.btnRmImg.addEventListener('click',rmImg);
D.iv.addEventListener('click',function(){D.iv.classList.remove('open')});
// Toast click - dismiss & scroll
D.toast.addEventListener('click',function(){
D.toast.classList.remove('show');clearTimeout(S.toastTimer);
clearUnread();updBadge();setFavicon(0);scrollBot();
});
// Notification toggle
D.btnNotif.addEventListener('click',function(){
S.soundOn=!S.soundOn;
saveSoundPref();
if(S.soundOn){
showToggleTip('рЯФФ жґИжБѓжПРйЖТеЈ≤еЉАеРѓ');
unlockAudio();
}else{
showToggleTip('рЯФХ жґИжБѓжПРйЖТеЈ≤еЕ≥йЧ≠');
}
});
// Offline summary dismiss
D.obBtn.addEventListener('click',hideOfflineSummary);
D.offlineSummary.addEventListener('click',function(e){if(e.target===D.offlineSummary)hideOfflineSummary()});
}

// ========== LOGIN / LOGOUT ==========
function doLogin(){
var u=D.iUser.value.trim().toLowerCase(),p=D.iPass.value;
if(!u||!p){D.loginErr.textContent='иѓЈиЊУеЕ•зФ®жИЈеРНеТМеѓЖз†Б';return}
if(!CFG.users[u]){D.loginErr.textContent='зФ®жИЈдЄНе≠ШеЬ®';return}
if(CFG.users[u].pw!==p){D.loginErr.textContent='еѓЖз†БйФЩиѓѓ';return}
S.user={name:u,display:CFG.users[u].name};
D.loginErr.textContent='';
unlockAudio();
// Request notification permission
if('Notification' in window){
if(Notification.permission==='granted')S.nperm='granted';
else if(Notification.permission!=='denied')Notification.requestPermission().then(function(p){S.nperm=p});
}
// Load unread count from previous session
loadUnread();
showChat();
}

function doLogout(){
if(S.client){pubPres('offline');setTimeout(function(){try{S.client.end()}catch(e){};S.client=null},500)}
clearInterval(S.hb);
clearUnread();
S.user=null;S.omap={};
D.msgs.innerHTML='';D.chat.style.display='none';D.login.style.display='flex';
D.iUser.value='';D.iPass.value='';
setFavicon(0);
document.title='йЪРзІБиБКе§©';
}

// ========== CHAT ==========
function showChat(){
D.login.style.display='none';D.chat.style.display='flex';
D.hdrUser.textContent=S.user.display;
fixIOS();loadHist();initEP();connect();
}

function loadHist(){
D.msgs.innerHTML='';
if(S.stor){try{var d=localStorage.getItem('ltrj_h_'+S.user.name);if(d)S.hist=JSON.parse(d)}catch(e){S.hist=[]}}
if(S.hist.length){
addSys('--- еОЖеП≤жґИжБѓ ('+S.hist.length+'жЭ°) ---');
S.hist.forEach(function(m){
if(m.type==='chat')addMsg(m.text,m.sender,m.sent,m.ts);
else if(m.type==='emoji')addEmo(m.emoji,m.sender,m.sent,m.ts,m.sticker);
else if(m.type==='image')addImg(m.data,m.sender,m.sent,m.ts);
});
setTimeout(scrollBot,50);
}
}

function saveH(m){S.hist.push(m);if(S.hist.length>500)S.hist=S.hist.slice(-500);if(S.stor){try{localStorage.setItem('ltrj_h_'+S.user.name,JSON.stringify(S.hist))}catch(e){}}}

// ========== EMOJI ==========
function initEP(){
D.etabs.innerHTML='';
EC.forEach(function(c,i){
var b=document.createElement('button');b.className='etab'+(i===0?' on':'');b.textContent=c.n;
b.addEventListener('click',function(){D.etabs.querySelectorAll('.etab').forEach(function(t){t.classList.remove('on')});b.classList.add('on');rGrid(i)});
D.etabs.appendChild(b);
});
rGrid(0);
}

function rGrid(i){
D.egrid.innerHTML='';
EC[i].e.forEach(function(em){
var s=document.createElement('span');s.className='ei';s.textContent=em;
s.addEventListener('click',function(){D.iMsg.value+=em});
D.egrid.appendChild(s);
});
}

// ========== SEND ==========
function doSend(){
var t=D.iMsg.value.trim();
if(S.pimg){sendImg();if(t)sendTxt(t);return}
if(t)sendTxt(t);
}

function sendTxt(t){
if(!S.client||!S.client.connected){setS('жЬ™ињЮжО•','err');return}
var ts=Date.now();
addMsg(t,S.user.display,true,ts);saveH({type:'chat',text:t,sender:S.user.display,sent:true,ts:ts});
S.client.publish(CFG.topic+'/messages',JSON.stringify({type:'chat',username:S.user.name,displayName:S.user.display,text:t,ts:ts}),{qos:1});
D.iMsg.value='';
}

function sendImg(){
if(!S.pimg||!S.client||!S.client.connected)return;
var ts=Date.now();
addImg(S.pimg,S.user.display,true,ts);saveH({type:'image',data:S.pimg,sender:S.user.display,sent:true,ts:ts});
S.client.publish(CFG.topic+'/messages',JSON.stringify({type:'image',username:S.user.name,displayName:S.user.display,imageData:S.pimg,ts:ts}),{qos:1});
rmImg();
}

function procImg(f){
if(f.size>10*1024*1024){alert('еЫЊзЙЗдЄНиГљиґЕињЗ10MB');return}
var r=new FileReader();
r.onload=function(e){
var img=new Image();
img.onload=function(){
var c=document.createElement('canvas'),mw=800,mh=800,w=img.width,h=img.height;
if(w>mw){h=h*(mw/w);w=mw}if(h>mh){w=w*(mh/h);h=mh}
c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
var d=c.toDataURL('image/jpeg',0.7);
S.pimg=d;D.prevImg.src=d;D.prevInfo.textContent=w+'x'+h+' ¬Ј '+Math.round(d.length/1024)+'KB';
D.ip.classList.add('open');
};img.src=e.target.result;
};r.readAsDataURL(f);
}

function rmImg(){S.pimg=null;D.ip.classList.remove('open');D.prevImg.src=''}

// ========== MESSAGE DISPLAY ==========
function addMsg(t,sn,sent,ts){
var d=document.createElement('div');d.className='m '+(sent?'s':'r');
var h='';if(!sent)h+='<div class="sn">'+esc(sn)+'</div>';
h+='<div>'+esc(t)+'</div><div class="tm">'+fmt(ts)+'</div>';
d.innerHTML=h;D.msgs.appendChild(d);scrollBot();
}

function addEmo(em,sn,sent,ts,stk){
var d=document.createElement('div');d.className='m '+(sent?'s':'r');
var h='';if(!sent)h+='<div class="sn">'+esc(sn)+'</div>';
h+='<div class="eo" style="font-size:'+(stk?'56px':'48px')+'">'+em+'</div>';
h+='<div class="tm">'+fmt(ts)+'</div>';
d.innerHTML=h;D.msgs.appendChild(d);scrollBot();
}

function addImg(data,sn,sent,ts){
var d=document.createElement('div');d.className='m '+(sent?'s':'r');
var h='';if(!sent)h+='<div class="sn">'+esc(sn)+'</div>';
h+='<img class="mi" src="'+data+'"><div class="tm">'+fmt(ts)+'</div>';
d.innerHTML=h;
d.querySelector('img').addEventListener('click',function(){D.viewImg.src=data;D.iv.classList.add('open')});
D.msgs.appendChild(d);scrollBot();
}

function addSys(t){var d=document.createElement('div');d.className='m sys';d.textContent=t;D.msgs.appendChild(d);scrollBot()}
function scrollBot(){requestAnimationFrame(function(){D.msgs.scrollTop=D.msgs.scrollHeight})}

// ========== MQTT ==========
function connect(){
setS('ж≠£еЬ®ињЮжО•...','');var idx=0;
S.reconnecting=true;
function tryC(i){
if(i>=CFG.brokers.length){setS('ињЮжО•е§±иі•','err');S.reconnecting=false;return}
try{
S.client=mqtt.connect(CFG.brokers[i],{
clientId:'ltrj-'+S.user.name,
clean:false,
connectTimeout:8000,
reconnectPeriod:3000,
keepalive:15
});
S.client.on('connect',function(){
setS('еЈ≤ињЮжО•','ok');
S.reconnecting=false;
S.client.subscribe(CFG.topic+'/messages',{qos:1});
S.client.subscribe(CFG.topic+'/presence',{qos:1});
pubPres('online');
addSys(S.user.display+' еК†еЕ•иБКе§©еЃ§');
S.hb=setInterval(function(){pubPres('online')},12000);
S.client.publish(CFG.topic+'/presence',JSON.stringify({type:'presence_request',username:S.user.name,ts:Date.now()}));
// Show offline summary if there are unread messages from previous session
if(S.ucount>0){
setTimeout(function(){showOfflineSummary()},800);
}else{
showToggleTip('вЬЕ жґИжБѓжПРйЖТеЈ≤е∞±зї™');
}
});
S.client.on('message',function(tp,p){
try{var d=JSON.parse(p.toString());if(!d)return;
if(tp===CFG.topic+'/messages')onMsg(d);
else if(tp===CFG.topic+'/presence')onPres(d);
}catch(e){}
});
S.client.on('error',function(){});
S.client.on('offline',function(){setS('еЈ≤жЦ≠еЉА','err')});
S.client.on('reconnect',function(){setS('йЗНињЮдЄ≠...','')});
}catch(e){setTimeout(function(){tryC(i+1)},1000)}
}
tryC(idx);
}

function onMsg(d){
if(d.username===S.user.name)return;
// Skip if this is an old message we've already seen
if(d.ts&&d.ts<=S.lastTs)return;
S.lastTs=d.ts;
var sn=d.displayName||d.username;
if(d.type==='chat'){
saveH({type:'chat',text:d.text,sender:sn,sent:false,ts:d.ts});
addMsg(d.text,sn,false,d.ts);
showNotif(sn,d.text);
}else if(d.type==='emoji'){
saveH({type:'emoji',emoji:d.emoji,sender:sn,sent:false,ts:d.ts,sticker:d.sticker});
addEmo(d.emoji,sn,false,d.ts,d.sticker);
showNotif(sn,'[и°®жГЕ]');
}else if(d.type==='image'){
saveH({type:'image',data:d.imageData,sender:sn,sent:false,ts:d.ts});
addImg(d.imageData,sn,false,d.ts);
showNotif(sn,'[еЫЊзЙЗ]');
}
}

function pubPres(s){if(!S.client||!S.client.connected)return;S.client.publish(CFG.topic+'/presence',JSON.stringify({type:'presence',username:S.user.name,displayName:S.user.display,status:s,ts:Date.now()}))}

function onPres(d){
if(d.type==='presence'){
if(d.status==='online')S.omap[d.username]={name:d.displayName||d.username,ts:d.ts};
else if(d.status==='offline')delete S.omap[d.username];
renderO();
}else if(d.type==='presence_request'){pubPres('online')}
}

function renderO(){
var now=Date.now();
for(var k in S.omap){if(now-S.omap[k].ts>45000)delete S.omap[k]}
S.omap[S.user.name]={name:S.user.display,ts:now};
var a=[];for(var k in S.omap){var sf=k===S.user.name?'пЉИдљ†пЉЙ':'';a.push(S.omap[k].name+sf)}
D.hdrOnline.innerHTML=a.map(function(n){return '<span class="ous"><span class="odot"></span>'+esc(n)+'</span>'}).join('');
}
setInterval(function(){if(S.user)renderO()},10000);

// ========== UTILS ==========
function setS(t,c){D.sync.textContent=t;D.sync.className='ss'+(c?' '+c:'')}
function esc(s){var d=document.createElement('div');d.appendChild(document.createTextNode(s));return d.innerHTML}
function fmt(ts){var d=new Date(ts);return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)}

// ========== START ==========
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
})();
</script>
